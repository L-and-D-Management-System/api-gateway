name: api-gateway CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: L-and-D-Management-System/LnD/.github/workflows/reusable-ci.yaml@main
    with:
      service_name: api-gateway
      image_name: api-gateway
      dev_manifest_path: infra_new/argocd/dev/api-gateway.yaml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      TOKEN: ${{ secrets.GHCR_PAT }}

  release:
    if: github.event_name == 'workflow_dispatch'
    uses: L-and-D-Management-System/LnD/.github/workflows/reusable-release.yaml@main
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: api-gateway
      dev_manifest_path: infra_new/argocd/dev/api-gateway.yaml
      prod_manifest_path: ${{ format('infra_new/argocd/prod/{0}', (split-path infra_new/argocd/dev/api-gateway.yaml -leaf)) }}
    secrets:
      TOKEN: ${{ secrets.GHCR_PAT }}